databases:
  - name: bitespeed-db
    plan: free
    databaseName: bitespeed
    user: bitespeed_user

services:
  - type: web
    plan: free
    name: bitespeed-identity-reconciliation
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString
